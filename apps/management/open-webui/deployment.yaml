apiVersion: apps/v1
kind: Deployment
metadata:
  name: open-webui
  namespace: management
spec:
  replicas: 1
  selector:
    matchLabels: { app: open-webui }
  template:
    metadata:
      labels: { app: open-webui }
    spec:
      containers:
        - name: open-webui
          image: ghcr.io/open-webui/open-webui:main
          ports:
            - containerPort: 8080
          env:
            - name: OPENAI_API_BASE_URL
              value: "http://litellm-service.ai-core.svc.cluster.local:4000/v1"
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef: { name: open-webui-secrets, key: virtual_key }
            - name: WEBUI_NAME
              value: "MvGates AI"
            - name: ENABLE_SIGNUP
              value: "true"
          volumeMounts:
            - name: data
              mountPath: /app/backend/data
      volumes:
        - name: data
          persistentVolumeClaim: { claimName: open-webui-data }
---
apiVersion: v1
kind: Service
metadata:
  name: open-webui-service
  namespace: management
spec:
  ports: [{ port: 80, targetPort: 8080 }]
  selector: { app: open-webui }
