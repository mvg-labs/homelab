apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: open-webui-web
  namespace: management
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-production
spec:
  entryPoints: [websecure]
  routes:
    - match: Host(`ai.mvgates.com`)
      kind: Rule
      services:
        - name: open-webui
          port: 8080
  tls:
    secretName: ai-mvgates-tls
