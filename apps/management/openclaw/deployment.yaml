apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  namespace: management
spec:
  replicas: 1
  selector:
    matchLabels: { app: openclaw }
  template:
    metadata:
      labels: { app: openclaw }
    spec:
      serviceAccountName: openclaw-sa
      securityContext:
        fsGroup: 1000
      containers:
        - name: openclaw
          image: ghcr.io/openclaw/openclaw:latest
          env:
            - name: OPENCLAW_CONFIG_PATH
              value: "/home/node/.openclaw/openclaw.json"
            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef: { name: openclaw-secrets, key: gateway_token }
            - name: OPENAI_API_BASE_URL
              value: "http://litellm-service.ai-core.svc.cluster.local:4000/v1"
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef: { name: openclaw-secrets, key: virtual_key }
          volumeMounts:
            - name: state
              mountPath: /home/node/.openclaw
            - name: config-file
              mountPath: /home/node/.openclaw/openclaw.json
              subPath: openclaw.json
            - name: brainbox
              mountPath: /app/brainbox
            - name: homelab-repo
              mountPath: /app/homelab

        - name: ambassador
          image: alpine/socat:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "Starting Resilient Bridge..."
              # This loop keeps trying to connect to the agent even if it's not ready yet
              while true; do
                socat TCP-LISTEN:8000,fork,reuseaddr TCP:127.0.0.1:18789
                echo "Agent not ready, retrying in 2s..."
                sleep 2
              done
          ports:
            - containerPort: 8000
      volumes:
        - name: state
          persistentVolumeClaim: { claimName: openclaw-state-pvc }
        - name: config-file
          configMap:
            name: openclaw-config
        - name: brainbox
          nfs:
            server: 192.168.120.4
            path: /mnt/databox/lab/brainbox
        - name: homelab-repo
          nfs:
            server: 192.168.120.4
            path: /mnt/databox/mgmt/soul/homelab
