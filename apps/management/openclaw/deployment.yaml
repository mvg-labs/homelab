apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  namespace: management
spec:
  replicas: 1
  selector:
    matchLabels: { app: openclaw }
  template:
    metadata:
      labels: { app: openclaw }
    spec:
      serviceAccountName: openclaw-sa
      securityContext:
        fsGroup: 1000 # Ensures the 'node' user owns the NVMe volume

      # --- THE CONSTRUCTION CREW (INIT CONTAINER) ---
      initContainers:
        - name: init-config
          image: busybox:latest
          command: ["sh", "-c"]
          args:
            - |
              mkdir -p /home/node/.openclaw
              # If the file is empty or missing, write a valid empty JSON object
              if [ ! -s /home/node/.openclaw/openclaw.json ]; then
                echo "{}" > /home/node/.openclaw/openclaw.json
              fi
              chown -R 1000:1000 /home/node/.openclaw
          volumeMounts:
            - name: state
              mountPath: /home/node/.openclaw
      # ----------------------------------------------

      containers:
        - name: openclaw
          image: ghcr.io/openclaw/openclaw:latest
          # Use the official start command to force the network bind
          command: ["node", "dist/index.js", "gateway"]
          args:
            - "--bind"
            - "lan"
            - "--port"
            - "18789"
            - "--allow-unconfigured"
          env:
            - name: HOME
              value: "/home/node"

            # 1. AUTHENTICATION (From Infisical)
            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef: { name: openclaw-secrets, key: gateway_token }
            - name: GATEWAY_AUTH_TOKEN # Double-prefix for safety
              valueFrom:
                secretKeyRef: { name: openclaw-secrets, key: gateway_token }

            # 2. SECURITY BYPASS (From error logs)
            - name: GATEWAY_CONTROL_UI_DANGEROUSLY_ALLOW_HOST_HEADER_ORIGIN_FALLBACK
              value: "true"
            - name: GATEWAY_CONTROL_UI_ALLOWED_ORIGINS
              value: '["https://claw.mvgates.com"]'
            - name: GATEWAY_TRUSTED_PROXIES
              value: '["10.244.0.0/16", "127.0.0.1"]'

            # 3. UPSTREAM API (LiteLLM)
            - name: OPENAI_API_BASE_URL
              value: "http://litellm-service.ai-core.svc.cluster.local:4000/v1"
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef: { name: openclaw-secrets, key: virtual_key }

            # 4. GIT IDENTITY
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef: { name: openclaw-secrets, key: github_token }
            - name: GIT_AUTHOR_NAME
              value: "OpenClaw SRE"
            - name: GIT_AUTHOR_EMAIL
              value: "openclaw@mvgates.com"

          volumeMounts:
            - name: state
              mountPath: /home/node/.openclaw
            - name: brainbox
              mountPath: /app/brainbox
            - name: homelab-repo
              mountPath: /app/homelab
      volumes:
        - name: state
          persistentVolumeClaim: { claimName: openclaw-state-pvc }
        - name: brainbox
          nfs:
            server: 192.168.120.4
            path: /mnt/databox/lab/brainbox
        - name: homelab-repo
          nfs:
            server: 192.168.120.4
            path: /mnt/databox/mgmt/soul/homelab
