apiVersion: v1
kind: ServiceAccount
metadata:
  name: openclaw-sa
  namespace: management
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: openclaw-observer
rules:
  - apiGroups: ["*"]
    resources: ["pods", "services", "nodes", "events", "deployments", "statefulsets", "ingresses"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: openclaw-observer-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: openclaw-observer
subjects:
  - kind: ServiceAccount
    name: openclaw-sa
    namespace: management
