apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: openclaw-web
  namespace: management
spec:
  entryPoints: [web, websecure]
  routes:
    - match: Host(`claw.mvgates.com`)
      kind: Rule
      middlewares:
        - name: openclaw-stealth-mode
      services:
        - name: openclaw-service
          port: 80
  tls:
    secretName: openclaw-tls
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: openclaw-stealth-mode
  namespace: management
spec:
  headers:
    customRequestHeaders:
      X-Forwarded-For: ""
      X-Real-IP: ""
      X-Forwarded-Host: ""
