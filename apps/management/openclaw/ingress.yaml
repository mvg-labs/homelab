apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: openclaw-web
  namespace: management
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-production
spec:
  entryPoints: [websecure]
  routes:
    - match: Host(`claw.mvgates.com`)
      kind: Rule
      services:
        - name: openclaw-service
          port: 80
  tls:
    secretName: openclaw-tls
