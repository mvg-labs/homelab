apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: litellm-postgres
  namespace: ai-core

spec:
  serviceName: litellm-postgres
  replicas: 1

  selector:
    matchLabels:
      app: litellm-postgres

  template:
    metadata:
      labels:
        app: litellm-postgres

    spec:

      containers:
        - name: postgres
          image: postgres:16-alpine

          env:
            - name: POSTGRES_USER
              value: postgres

            - name: POSTGRES_PASSWORD
              value: postgres

            - name: POSTGRES_DB
              value: litellm

            - name: POSTGRES_INITDB_SKIP
              value: "true"

            - name: POSTGRES_HOST_AUTH_METHOD
              value: trust
          ports:
            - containerPort: 5432

          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data

      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: litellm-db-pvc

