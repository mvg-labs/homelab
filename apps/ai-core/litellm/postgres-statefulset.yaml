apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: litellm-postgres
  namespace: ai-core

spec:
  serviceName: litellm-postgres
  replicas: 1

  selector:
    matchLabels:
      app: litellm-postgres

  template:
    metadata:
      labels:
        app: litellm-postgres

    spec:
      securityContext:
        fsGroup: 1001
        runAsNonRoot: true

      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 5432

          env:
            - name: POSTGRES_USER
              value: postgres

            - name: POSTGRES_PASSWORD
              value: postgres

            - name: POSTGRES_DB
              value: litellm

            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata

          securityContext:
            allowPrivilegeEscalation: false
            runAsUser: 999
            runAsGroup: 999

          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data

          readinessProbe:
            tcpSocket:
              port: 5432
            initialDelaySeconds: 20
            periodSeconds: 10

          livenessProbe:
            tcpSocket:
              port: 5432
            initialDelaySeconds: 40
            periodSeconds: 20

  volumeClaimTemplates:
    - metadata:
        name: postgres-data

      spec:
        accessModes:
          - ReadWriteOnce

        storageClassName: ceph-block

        resources:
          requests:
            storage: 5Gi

